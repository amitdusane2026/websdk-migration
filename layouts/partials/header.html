<header class="topbar">
  <a class="brandblock" href="{{ "/" | relURL }}">
    <span class="brandmark" aria-hidden="true">A</span>
    <span class="brandtext">
      <span class="brandname">Amit G. Dusane</span>
      <span class="brandby">Adobe Experience Platform <b>·</b> Analytics &amp; CJA</span>
    </span>
  </a>
  <span class="spacer"></span>
  <button class="search-btn" id="searchBtn" aria-label="Search the guide">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <span class="sl">Search</span><span class="sk">/</span>
  </button>
  <nav class="topnav" aria-label="Primary">
    {{ $cur := .RelPermalink }}
    <a class="topnavlink {{ if eq $cur "/" }}active{{ end }}" href="{{ "/" | relURL }}">Home</a>
    <a class="topnavlink {{ if hasPrefix $cur "/web-sdk-migration" }}active{{ end }}" href="{{ "/web-sdk-migration/" | relURL }}">Web SDK Migration</a>
    <a class="topnavlink about {{ if eq $cur "/about/" }}active{{ end }}" href="{{ "/about/" | relURL }}">About</a>
  </nav>
  <button class="theme-btn" id="themeBtn" aria-label="Toggle dark mode" aria-pressed="false" title="Toggle dark mode">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
  </button>
</header>
