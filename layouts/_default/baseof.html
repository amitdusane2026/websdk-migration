<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
{{ partial "head.html" . }}
<body>
  {{ partial "header.html" . }}
  <main class="wrap">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <div class="search-overlay" id="searchOverlay" hidden>
    <div class="search-box" role="dialog" aria-modal="true" aria-label="Search the guide">
      <div class="search-in">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="searchInput" type="text" placeholder="Search steps, topics, and references…" autocomplete="off" spellcheck="false" aria-label="Search">
        <kbd>Esc</kbd>
      </div>
      <div class="search-results" id="searchResults"><div class="search-hint">Type to search the guide.</div></div>
    </div>
  </div>
  <script>window.SEARCH_INDEX="{{ "index.json" | relURL }}";</script>
  <script src="{{ "theme.js" | relURL }}"></script>
  <script src="{{ "search.js" | relURL }}"></script>
</body>
</html>
